<html lang="en">
<head>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
    #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(to top right,#4ade80 0%,#7c3aed 50%,#064e3b 100%)}
    .login-box{background:white;border-radius:16px;padding:36px 32px 32px;width:340px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
    .login-logo{text-align:center;margin-bottom:24px}
    .login-logo h1{font-size:1.4rem;font-weight:700;color:#1a1a2e}
    .login-logo p{font-size:.82rem;color:#999;margin-top:3px}
    .login-box label{display:block;font-size:.72rem;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
    .login-box input{width:100%;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:.92rem;margin-bottom:16px;outline:none;transition:border .2s;background:#fafafa}
    .login-box input:focus{border-color:#b5179e;background:white}
    .pw-wrap{position:relative;margin-bottom:16px}
    .pw-wrap input{margin-bottom:0;padding-right:52px}
    .pw-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#f0f0f0;border:none;border-radius:5px;cursor:pointer;color:#555;font-size:.75rem;padding:4px 8px}
    .login-btn{width:100%;padding:12px;background:#b5179e;color:white;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
    .login-btn:hover{background:#9a1286}
    .login-error{color:#c62828;font-size:.82rem;text-align:center;margin-top:12px;display:none}
    #appScreen{display:none}
    header{background:linear-gradient(135deg,#b5179e 0%,#7b2ff7 100%);color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(181,23,158,.3);position:sticky;top:0;z-index:100}
    .header-left h1{font-size:1.3rem;font-weight:700}
    .header-left .subtitle{font-size:.8rem;opacity:.85}
    .header-right{display:flex;align-items:center;gap:14px}
    .user-pill{background:rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:.82rem;font-weight:600}
    .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:white;border-radius:8px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:background .2s}
    .logout-btn:hover{background:rgba(255,255,255,.3)}
    .container{max-width:1200px;margin:0 auto;padding:24px 16px}
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-card{background:white;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:pointer}
    .stat-card .num{font-size:2rem;font-weight:700;color:#b5179e}
    .stat-card .lbl{font-size:.75rem;color:#666;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
    .store-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
    .store-tab{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;background:white;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .store-tab.active{color:white}
    .store-tab:not(.active){color:#444}
    .day-section{margin-bottom:28px}
    .day-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .day-label{font-size:1.05rem;font-weight:700}
    .day-count{background:#b5179e;color:white;border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:600}
    .day-line{flex:1;height:1px;background:#e0e0e0}
    .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
    .order-card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:transform .15s,box-shadow .15s;cursor:pointer}
    .order-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.14)}
    .card-stripe{height:5px}
    .card-body{padding:14px 16px}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
    .order-ref{font-size:.9rem;font-weight:700}
    .order-no{font-size:.72rem;color:#888;margin-top:2px;font-family:monospace}
    .label-badge{color:white;border-radius:6px;padding:3px 9px;font-size:.73rem;font-weight:700;letter-spacing:.5px}
    .delivery-time{font-size:.85rem;color:#444;font-weight:500;margin-bottom:8px}
    .sb{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:3px 9px;font-size:.75rem;font-weight:600;margin-bottom:8px}
    .sb-d{background:#e8f5e9;color:#2e7d32}
    .sb-o{background:#e3f2fd;color:#1565c0}
    .sb-t{background:#fff8e1;color:#f57f17}
    .sb-p{background:#fce4ec;color:#c62828}
    .tracking-link{display:block;color:#1565c0;text-decoration:none;font-size:.72rem;font-family:monospace;margin-bottom:2px}
    .tracking-link:hover{text-decoration:underline}
    .no-tracking{font-size:.73rem;color:#aaa;font-style:italic}
    .creds-panel{background:white;border-radius:12px;padding:20px;margin-bottom:24px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
    .creds-panel h3{font-size:.85rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
    .creds-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .creds-table th{text-align:left;padding:8px 12px;background:#f5f5f5;color:#555;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.4px}
    .creds-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
    .creds-table tr:last-child td{border-bottom:none}
    .store-dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:middle}
    .copy-btn{background:#f0f0f0;border:none;border-radius:5px;padding:3px 8px;font-size:.72rem;cursor:pointer;color:#555}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .2s;pointer-events:none}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal-box{background:white;border-radius:20px;width:100%;max-width:520px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.35);transform:translateY(24px) scale(.97);transition:transform .25s,opacity .25s;opacity:0}
    .modal-overlay.open .modal-box{transform:translateY(0) scale(1);opacity:1}
    .modal-header{padding:20px 24px 16px;display:flex;align-items:flex-start;justify-content:space-between}
    .modal-title{font-size:1.15rem;font-weight:700}
    .modal-sub{font-size:.82rem;color:#777;margin-top:3px}
    .modal-close{background:#f0f0f0;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .modal-close:hover{background:#e0e0e0}
    .track-section{padding:0 24px 20px}
    .track-road{position:relative;margin:36px 0 52px;height:8px;background:#e8e8e8;border-radius:4px}
    .track-bar{position:absolute;left:0;top:0;height:100%;border-radius:4px}
    .track-truck{position:absolute;top:-20px;transform:translateX(-50%);font-size:24px}
    .track-dots{position:absolute;top:0;left:0;right:0}
    .track-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid white;background:#ddd;transition:background .5s,box-shadow .5s}
    .track-labels{position:absolute;top:18px;left:0;right:0}
    .track-lbl{position:absolute;transform:translateX(-50%);font-size:.65rem;font-weight:600;color:#aaa;text-align:center;white-space:nowraw;transition:color .5s}
    .track-lbl.active{color:#333}
    .track-lbl span{display:block;font-size:.58rem;color:inherit;margin-top:1px}
    .modal-body{padding:0 24px 24px}
    .modal-eta{background:#f0f9ff;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.85rem;color:#0369a1;font-weight:500}
    .modal-status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .modal-tracking{background:#f8f8f8;border-radius:10px;padding:14px 16px}
    .modal-tracking h4{font-size:.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
    .modal-tlink{display:block;color:#1565c0;text-decoration:none;font-size:.78rem;font-family:monospace;padding:5px 0;border-bottom:1px solid #eee}
    .modal-tlink:last-child{border-bottom:none;padding-bottom:0}
    .modal-tlink:hover{text-decoration:underline}
    .modal-notrack{font-size:.8rem;color:#aaa;font-style:italic}

</head>

      <h1>Tomorrow Telecom</h1>

    <label>Username</label>

    <label>Password</label>

      <button class="pw-toggle" type="button" id="pwToggle" onclick="togglePw()">Show</button>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect username or password.</div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div><div class="modal-title" id="modalTitle"></div><div class="modal-sub" id="modalSub"></div></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="track-section">
      <div class="track-road">
        <div class="track-bar" id="trackBar"></div>
        <div class="track-truck" id="trackTruck">&#128666;</div>
        <div class="track-dots" id="trackDots"></div>
        <div class="track-labels" id="trackLabels"></div>
      </div>
    </div>
    <div class="modal-body">
      <div id="modalEta"></div>
      <div class="modal-status-row" id="modalStatusRow"></div>
      <div class="modal-tracking" id="modalTracking"></div>
    </div>
  </div>
</div>

<div id="appScreen">
  <header>
    <div class="header-left"><h1>Tomorrow Telecom</h1><div class="subtitle">Delivery Tracking Portal</div></div>
    <div class="header-right">
      <div class="user-pill" id="userPill"></div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <div class="container">
    <div class="stats-row" id="statsRow"></div>
    <div id="adminCredsSection" style="display:none"><div class="creds-panel"><h3>Store Login Credentials</h3><table class="creds-table" id="credsTable"></table></div></div>
    <div id="adminTabs" style="display:none;margin-bottom:16px"><div class="store-tabs" id="storeTabs"></div></div>
    <div style="margin-bottom:16px"><div class="store-tabs" id="statusTabs"></div></div>
    <div id="calendarContainer"></div>
  </div>
</div>

var cu=null,asf='ALL',asst='ALL';

function togglePw(){
  var i=document.getElementById('passwordInput'),b=document.getElementById('pwToggle');
  if(i.type==='password'){i.type='text';b.textContent='Hide';}else{i.type='password';b.textContent='Show';}
}
document.getElementById('passwordInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('usernameInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function doLogin(){
  var un=document.getElementById('usernameInput').value.trim().toLowerCase();
  var pw=document.getElementById('passwordInput').value.trim();
  var user=null;
  for(var i=0;i<U.length;i++){if(U[i].u===un&&U[i].p===pw){user=U[i];break;}}
  if(!user){document.getElementById('loginError').style.display='block';return;}
  cu=user;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  document.getElementById('userPill').textContent='User: '+user.n;
  renderApp();
}
function doLogout(){
  cu=null;asf='ALL';asst='ALL';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  document.getElementById('usernameInput').value='';
  document.getElementById('passwordInput').value='';
  document.getElementById('loginError').style.display='none';
}

  var del=vo.filter(function(o){return o.s==='Delivered';}).length;
  var out=vo.filter(function(o){return o.s==='OutForDelivery';}).length;
  var inT=vo.filter(function(o){return o.s==='InTransit';}).length;
  var inP=vo.filter(function(o){return o.s==='InProcess';}).length;
  document.getElementById('statsRow').innerHTML=
    sc('ALL','Total',vo.length,'#b5179e')+
    sc('Delivered','Delivered',del,'#2e7d32')+
    sc('OutForDelivery','Out for Delivery',out,'#1565c0')+
    sc('InTransit','In Transit',inT,'#f57f17')+
    sc('InProcess','In Process',inP,'#c62828');
  if(isA){
    document.getElementById('adminCredsSection').style.display='block';
    document.getElementById('adminTabs').style.display='block';
    renderCreds();renderStoreTabs();
  }else{
    document.getElementById('adminCredsSection').style.display='none';
    document.getElementById('adminTabs').style.display='none';
  }
  renderStatusTabs();renderCalendar();
}
function sc(s,lbl,n,col){
  return '<div class="stat-card" onclick="setSS(\''+s+'\')"><div class="num" style="color:'+col+'">'+n+'</div><div class="lbl">'+lbl+'</div></div>';
}
function renderCreds(){
  var su=U.filter(function(u){return u.r==='store';});
  var h='<tr><th>Store</th><th>Username</th><th>Password</th></tr>';
  su.forEach(function(u){
    h+='<tr><td><span class="store-dot" style="background:'+(C[u.l]||'#999')+'"></span>'+u.l+'</td><td>'+u.u+'</td><td><span style="font-family:monospace">'+u.p+'</span> <button class="copy-btn" onclick="cp(\''+u.p+'\')">Copy</button></td></tr>';
  });
  document.getElementById('credsTable').innerHTML=h;
}
function renderStoreTabs(){
  var labs=[];O.forEach(function(o){if(labs.indexOf(o.l)<0)labs.push(o.l);});labs.sort();
  var h='';
  ['ALL'].concat(labs).forEach(function(l){
    var col=l==='ALL'?'#b5179e':(C[l]||'#999');
    var a=asf===l;
    h+='<div class="store-tab'+(a?' active':'')+'" style="'+(a?'background:'+col+';border-color:'+col:'border-color:'+col+';color:'+col)+'" onclick="setFS(\''+l+'\')">'+l+'</div>';
  });
  document.getElementById('storeTabs').innerHTML=h;
}
function renderStatusTabs(){
  var tabs=[['ALL','All'],['Delivered','Delivered'],['OutForDelivery','Out for Delivery'],['InTransit','In Transit'],['InProcess','In Process']];
  var cols={ALL:'#b5179e',Delivered:'#2e7d32',OutForDelivery:'#1565c0',InTransit:'#f57f17',InProcess:'#c62828'};
  var h='';
  tabs.forEach(function(t){
    var col=cols[t[0]];var a=asst===t[0];
    h+='<div class="store-tab'+(a?' active':'')+'" style="'+(a?'background:'+col+';border-color:'+col:'border-color:'+col+';color:'+col)+'" onclick="setSS(\''+t[0]+'\')">'+t[1]+'</div>';
  });
  document.getElementById('statusTabs').innerHTML=h;
}
function renderCalendar(){
  var isA=cu.r==='admin';
  var ords=isA?O.slice():O.filter(function(o){return o.l===cu.l;});
  if(isA&&asf!=='ALL')ords=ords.filter(function(o){return o.l===asf;});
  if(asst!=='ALL')ords=ords.filter(function(o){return o.s===asst;});
  var bd={};
  ords.forEach(function(o){var k=o.d==='PENDING'?'PENDING':o.d;if(!bd[k])bd[k]=[];bd[k].push(o);});
  var dk=Object.keys(bd).sort(function(a,b){if(a==='PENDING')return-1;if(b==='PENDING')return 1;return b.localeCompare(a);});
  if(!dk.length){document.getElementById('calendarContainer').innerHTML='<div style="text-align:center;color:#aaa;padding:48px 0">No orders match filters.</div>';return;}
  var h='';
  dk.forEach(function(k){
    var day=bd[k];var dl=k==='PENDING'?'Pending / In Process':fmtDate(k);
    h+='<div class="day-section"><div class="day-header"><div class="day-label">'+dl+'</div><div class="day-count">'+day.length+'</div><div class="day-line"></div></div><div class="orders-grid">';
    day.forEach(function(o){h+=cardHtml(o);});
    h+='</div></div>';
  });
  document.getElementById('calendarContainer').innerHTML=h;
}
function fmtDate(s){return new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function sbadge(s){
  var m={Delivered:'<span class="sb sb-d">Delivered</span>',OutForDelivery:'<span class="sb sb-o">Out for Delivery</span>',InTransit:'<span class="sb sb-t">In Transit</span>',InProcess:'<span class="sb sb-p">In Process</span>'};
  return m[s]||'';
}
function cardHtml(o){
  var col=C[o.l]||'#999';
  var tr=(o.tr&&o.tr.length)?o.tr.map(function(t){return'<a class="tracking-link" href="https://www.ups.com/track?tracknum='+t+'" target="_blank" onclick="event.stopPropagation()">'+t+'</a>';}).join(''):'<div class="no-tracking">No tracking number</div>';
  return'<div class="order-card" onclick="openModal(\''+o.ref+'\')">'+'<div class="card-stripe" style="background:'+col+'"></div>'+'<div class="card-body"><div class="card-top"><div><div class="order-ref">'+o.ref+'</div>'+(o.on?'<div class="order-no">Order #'+o.on+'</div>':'')+'</div><span class="label-badge" style="background:'+col+'">'+o.l+'</span></div>'+(o.t?'<div class="delivery-time">'+o.t+'</div>':'')+sbadge(o.s)+tr+'</div></div>';
}
function openModal(ref){
  var o=null;for(var i=0;i<O.length;i++){if(O[i].ref===ref){o=O[i];break;}}
  if(!o)return;
  var si=0;for(var j=0;j<ST.length;j++){if(ST[j].key===o.s){si=j;break;}}
  var pct=ST[si].pct;var sc2=SC[o.s]||'#999';
  document.getElementById('modalTitle').textContent=o.ref;
  document.getElementById('modalSub').textContent=o.l+(o.d!=='PENDING'?' - '+fmtDate(o.d):' - Pending');
  document.getElementById('modalEta').innerHTML=o.t?'<div class="modal-eta">'+(o.s==='Delivered'?'Delivered: ':'Estimated: ')+o.t+(o.loc?' - '+o.loc:'')+'</div>':'';
  document.getElementById('modalStatusRow').innerHTML=sbadge(o.s)+(o.on?'<span style="font-size:.82rem;color:#888;font-family:monospace">Order #'+o.on+'</span>':'');
  document.getElementById('modalTracking').innerHTML=(o.tr&&o.tr.length)?'<h4>UPS Tracking</h4>'+o.tr.map(function(t){return'<a class="modal-tlink" href="https://www.ups.com/track?tracknum='+t+'" target="_blank">'+t+'</a>';}).join(''):'<span class="modal-notrack">No tracking numbers available</span>';
  var de=document.getElementById('trackDots');var le=document.getElementById('trackLabels');
  de.innerHTML='';le.innerHTML='';
  ST.forEach(function(s,i){
    var reached=i<=si;var dc=reached?SC[s.key]:'#ddd';
    var dot=document.createElement('div');dot.className='track-dot'+(reached?' active':'');dot.style.left=s.pct+'%';dot.style.background=dc;dot.style.boxShadow='0 0 0 2px '+dc;de.appendChild(dot);
    var lbl=document.createElement('div');lbl.className='track-lbl'+(reached?' active':'');lbl.style.left=s.pct+'%';lbl.innerHTML=s.label+(s.sub?'<span>'+s.sub+'</span>':'');le.appendChild(lbl);
  });
  var bar=document.getElementById('trackBar');var trk=document.getElementById('trackTruck');
  bar.style.transition='none';trk.style.transition='none';
  bar.style.width='0%';bar.style.background='linear-gradient(to right,'+SC['InProcess']+','+sc2+')';
  trk.style.left='0%';
  document.getElementById('modalOverlay').classList.add('open');
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    bar.style.transition='width 0.9s cubic-bezier(.4,0,.2,1)';
    trk.style.transition='left 0.9s cubic-bezier(.4,0,.2,1)';
    bar.style.width=pct+'%';trk.style.left=pct+'%';
  });});
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function closeModalOnBg(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function setFS(l){asf=l;renderStoreTabs();renderCalendar();}
function setSS(s){asst=s;renderStatusTabs();renderCalendar();}
function cp(t){if(navigator.clipboard)navigator.clipboard.writeText(t).catch(function(){});}
</script>
</body>
</html>
