<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomorrow Telecom — Delivery Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #b5179e 0%, #560bad 100%);
    }
    .login-box {
      background: white; border-radius: 18px; padding: 40px 36px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 1.6rem; font-weight: 800; color: #b5179e; }
    .login-logo p { font-size: 0.85rem; color: #888; margin-top: 4px; }
    .login-box label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 9px;
      font-size: 0.95rem; margin-bottom: 16px; outline: none; transition: border 0.2s;
    }
    .login-box input:focus { border-color: #b5179e; }
    .login-btn {
      width: 100%; padding: 13px; background: #b5179e; color: white; border: none;
      border-radius: 9px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: #c1005f; }
    .login-error { color: #c62828; font-size: 0.82rem; text-align: center; margin-top: 12px; display: none; }

    /* ── APP ── */
    #appScreen { display: none; }
    header {
      background: linear-gradient(135deg, #b5179e 0%, #7b2ff7 100%);
      color: white; padding: 16px 24px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 2px 12px rgba(181,23,158,0.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left h1 { font-size: 1.3rem; font-weight: 700; }
    .header-left .subtitle { font-size: 0.8rem; opacity: 0.85; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-pill {
      background: rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px;
      font-size: 0.82rem; font-weight: 600;
    }
    .logout-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
      color: white; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem;
      cursor: pointer; transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: #b5179e; }
    .stat-card .lbl { font-size: 0.75rem; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── ADMIN: store tabs ── */
    .store-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .store-tab {
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 2px solid transparent; transition: all 0.15s; background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .store-tab.active { color: white; }
    .store-tab:not(.active) { color: #444; }

    /* ── CALENDAR ── */
    .day-section { margin-bottom: 28px; }
    .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .day-label { font-size: 1.05rem; font-weight: 700; }
    .day-count { background: #b5179e; color: white; border-radius: 20px; padding: 2px 10px; font-size: 0.75rem; font-weight: 600; }
    .day-line { flex: 1; height: 1px; background: #e0e0e0; }
    .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .order-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); transition: transform 0.15s, box-shadow 0.15s; }
    .order-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .card-stripe { height: 5px; }
    .card-body { padding: 14px 16px; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .order-ref { font-size: 0.9rem; font-weight: 700; }
    .label-badge { color: white; border-radius: 6px; padding: 3px 9px; font-size: 0.73rem; font-weight: 700; letter-spacing: 0.5px; }
    .delivery-time { font-size: 0.85rem; color: #444; font-weight: 500; margin-bottom: 8px; }
    .status-delivered { display: inline-flex; align-items: center; gap: 5px; background: #e8f5e9; color: #2e7d32; border-radius: 6px; padding: 3px 9px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
    .status-out      { display: inline-flex; align-items: center; gap: 5px; background: #e3f2fd; color: #1565c0; border-radius: 6px; padding: 3px 9px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
    .status-transit  { display: inline-flex; align-items: center; gap: 5px; background: #fff8e1; color: #f57f17; border-radius: 6px; padding: 3px 9px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
    .status-pending  { display: inline-flex; align-items: center; gap: 5px; background: #fce4ec; color: #c62828; border-radius: 6px; padding: 3px 9px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; }
    .tracking-list { margin-top: 6px; }
    .tracking-link { display: block; color: #1565c0; text-decoration: none; font-size: 0.72rem; font-family: 'Courier New', monospace; margin-bottom: 2px; }
    .tracking-link:hover { text-decoration: underline; }
    .no-tracking { font-size: 0.73rem; color: #aaa; font-style: italic; }

    /* ── CREDENTIALS TABLE (admin only) ── */
    .creds-panel {
      background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .creds-panel h3 { font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
    .creds-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .creds-table th { text-align: left; padding: 8px 12px; background: #f5f5f5; color: #555; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.4px; }
    .creds-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
    .creds-table tr:last-child td { border-bottom: none; }
    .store-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 7px; vertical-align: middle; }
    .copy-btn { background: #f0f0f0; border: none; border-radius: 5px; padding: 3px 8px; font-size: 0.72rem; cursor: pointer; color: #555; }
    .copy-btn:hover { background: #e0e0e0; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>📦 Tomorrow Telecom</h1>
      <p>Delivery Tracking Portal</p>
    </div>
    <label>Username</label>
    <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect username or password</div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <header>
    <div class="header-left">
      <h1>📦 Tomorrow Telecom</h1>
      <div class="subtitle">Delivery Tracking Portal</div>
    </div>
    <div class="header-right">
      <div class="user-pill" id="userPill"></div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <div class="container">
    <div class="stats-row" id="statsRow"></div>
    <div id="adminCredsSection" style="display:none">
      <div class="creds-panel">
        <h3>🔑 Store Login Credentials</h3>
        <table class="creds-table" id="credsTable"></table>
      </div>
    </div>
    <div id="adminTabs" style="display:none; margin-bottom:16px;">
      <div class="store-tabs" id="storeTabs"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div class="store-tabs" id="statusTabs"></div>
    </div>
    <div id="calendarContainer"></div>
  </div>
</div>

  { ref:'BADER0615',      label:'BADER',     date:'2026-06-18', time:'Est. by 9:00 PM', status:'OutForDelivery', tracking:['1Z7900AX0384273762','1Z7900AX0384273851','1Z7900AX0384273780'] },

  { ref:'SK0615WESC',     label:'SK',        date:'2026-06-19', time:'Est. by 9:00 PM', status:'InTransit', tracking:['1Z7900AX0384303701'] },
  { ref:'SULEMAN0615SP01',label:'SULEMAN',   date:'2026-06-19', time:'Est. by 9:00 PM', status:'InTransit', tracking:['1Z7900AX0384305763'] },

  { ref:'ALI0615SP01',    label:'ALI',       date:'PENDING', time:'', status:'InProcess', tracking:[] },

// ── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let activeStoreFilter = 'ALL';
let activeStatusFilter = 'ALL';

// ── LOGIN ────────────────────────────────────────────────────────────────────
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const u = document.getElementById('usernameInput').value.trim().toLowerCase();
  const p = document.getElementById('passwordInput').value.trim();
  const user = USERS.find(x => x.username === u && x.password === p);
  if (!user) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('userPill').textContent = '👤 ' + user.name;
  renderApp();
}

function doLogout() {
  currentUser = null;
  activeStoreFilter = 'ALL';
  activeStatusFilter = 'ALL';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderApp() {
  const isAdmin = currentUser.role === 'admin';
  const storeLabel = currentUser.label;

  // Filter orders for this user
  let visibleOrders = isAdmin ? ORDERS : ORDERS.filter(o => o.label === storeLabel);

  // Stats
  const delivered  = visibleOrders.filter(o => o.status === 'Delivered').length;
  const outFor     = visibleOrders.filter(o => o.status === 'OutForDelivery').length;
  const inTransit  = visibleOrders.filter(o => o.status === 'InTransit' || o.status === 'OnWayToUPS').length;
  const inProcess  = visibleOrders.filter(o => o.status === 'InProcess').length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card" style="cursor:pointer" onclick="setStatusFilter('ALL')"><div class="num">${visibleOrders.length}</div><div class="lbl">Total Orders</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="setStatusFilter('Delivered')"><div class="num" style="color:#2e7d32">${delivered}</div><div class="lbl">Delivered</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="setStatusFilter('OutForDelivery')"><div class="num" style="color:#1565c0">${outFor}</div><div class="lbl">Out for Delivery</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="setStatusFilter('InTransit')"><div class="num" style="color:#f57f17">${inTransit}</div><div class="lbl">In Transit</div></div>
    <div class="stat-card" style="cursor:pointer" onclick="setStatusFilter('InProcess')"><div class="num" style="color:#c62828">${inProcess}</div><div class="lbl">In Process</div></div>
  `;

  // Admin extras: credentials table + store filter tabs
  if (isAdmin) {
    document.getElementById('adminCredsSection').style.display = 'block';
    document.getElementById('adminTabs').style.display = 'block';
    renderCredsTable();
    renderStoreTabs();
  } else {
    document.getElementById('adminCredsSection').style.display = 'none';
    document.getElementById('adminTabs').style.display = 'none';
  }

  renderStatusTabs(visibleOrders);
  renderCalendar(visibleOrders);
}

function renderCredsTable() {
  const rows = USERS.filter(u => u.role === 'store').map(u => `
    <tr>
      <td><span class="store-dot" style="background:${COLORS[u.label]||'#999'}"></span><strong>${u.name}</strong></td>
      <td>${u.username}</td>
      <td>${u.password} <button class="copy-btn" onclick="copyText('${u.password}')">Copy</button></td>
    </tr>`).join('');
  document.getElementById('credsTable').innerHTML = `
    <thead><tr><th>Store</th><th>Username</th><th>Password</th></tr></thead>
    <tbody>${rows}</tbody>`;
}

function renderStoreTabs() {
  const labels = ['ALL', ...Object.keys(COLORS)];
  document.getElementById('storeTabs').innerHTML = labels.map(l => {
    const color = l === 'ALL' ? '#555' : (COLORS[l] || '#555');
    const isActive = activeStoreFilter === l;
    return `<button class="store-tab ${isActive ? 'active' : ''}"
      style="${isActive ? `background:${color};border-color:${color}` : `border-color:${color};color:${color}`}"
      onclick="setStoreFilter('${l}')">${l}</button>`;
  }).join('');
}

function setStoreFilter(label) {
  activeStoreFilter = label;
  activeStatusFilter = 'ALL';
  const byStore = label === 'ALL' ? ORDERS : ORDERS.filter(o => o.label === label);
  renderStoreTabs();
  renderStatusTabs(byStore);
  renderCalendar(byStore);
}

const STATUS_META = {
  ALL:             { label: 'All',             color: '#555' },
  OutForDelivery:  { label: '🚚 Out for Delivery', color: '#1565c0' },
  InTransit:       { label: '📦 In Transit',    color: '#f57f17' },
  Delivered:       { label: '✅ Delivered',      color: '#2e7d32' },
  InProcess:       { label: '🔄 In Process',    color: '#c62828' },
  OnWayToUPS:      { label: '⏳ On Way to UPS', color: '#f57f17' },
};

function renderStatusTabs(baseOrders) {
  const counts = {};
  baseOrders.forEach(o => { counts[o.status] = (counts[o.status]||0) + 1; });
  const presentStatuses = ['ALL', ...Object.keys(STATUS_META).filter(s => s !== 'ALL' && counts[s])];
  document.getElementById('statusTabs').innerHTML = presentStatuses.map(s => {
    const meta = STATUS_META[s] || { label: s, color: '#555' };
    const count = s === 'ALL' ? baseOrders.length : (counts[s] || 0);
    const isActive = activeStatusFilter === s;
    return `<button class="store-tab ${isActive ? 'active' : ''}"
      style="${isActive ? `background:${meta.color};border-color:${meta.color}` : `border-color:${meta.color};color:${meta.color}`}"
      onclick="setStatusFilter('${s}')">${meta.label} (${count})</button>`;
  }).join('');
}

function setStatusFilter(status) {
  activeStatusFilter = status;
  const isAdmin = currentUser.role === 'admin';
  let base = isAdmin ? ORDERS : ORDERS.filter(o => o.label === currentUser.label);
  if (activeStoreFilter !== 'ALL') base = base.filter(o => o.label === activeStoreFilter);
  const filtered = status === 'ALL' ? base : base.filter(o => o.status === status);
  renderStatusTabs(base);
  renderCalendar(filtered);
}
