<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomorrow Telecom — Delivery Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

    /* ── LOGIN ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #b5179e 0%, #560bad 100%);
    }
    .login-box {
      background: white; border-radius: 18px; padding: 40px 36px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo h1 { font-size: 1.6rem; font-weight: 800; color: #b5179e; }
    .login-logo p { font-size: 0.85rem; color: #888; margin-top: 4px; }
    .login-box label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 9px;
      font-size: 0.95rem; margin-bottom: 16px; outline: none; transition: border 0.2s;
    }
    .login-box input:focus { border-color: #b5179e; }
    .login-btn {
      width: 100%; padding: 13px; background: #b5179e; color: white; border: none;
      border-radius: 9px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: #c1005f; }
    .login-error { color: #c62828; font-size: 0.82rem; text-align: center; margin-top: 12px; display: none; }

    /* ── APP ── */
    #appScreen { display: none; }
    header {
      background: linear-gradient(135deg, #b5179e 0%, #7b2ff7 100%);
      color: white; padding: 16px 24px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 2px 12px rgba(181,23,158,0.3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-left h1 { font-size: 1.3rem; font-weight: 700; }
    .header-left .subtitle { font-size: 0.8rem; opacity: 0.85; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-pill {
      background: rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px;
      font-size: 0.82rem; font-weight: 600;
    }
    .logout-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
      color: white; border-radius: 8px; padding: 6px 14px; font-size: 0.82rem;
      cursor: pointer; transition: background 0.2s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .main-tab {
      padding: 14px 28px; font-size: 0.88rem; font-weight: 700; border: none;
      background: none; color: #888; cursor: pointer; border-bottom: 3px solid transparent;
      transition: all 0.15s; letter-spacing: 0.2px;
    }
    .main-tab.active { color: #b5179e; border-bottom-color: #b5179e; }
    .main-tab:hover:not(.active) { color: #555; background: #fafafa; }
    .margin-stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; margin-bottom: 18px; }
    .margin-stat { background: linear-gradient(135deg,#f3e5f5,#ede7f6); border-radius: 12px; padding: 14px 16px; text-align:center; }
    .margin-stat-num { font-size: 1.6rem; font-weight: 800; color: #4a148c; display:block; }
    .margin-stat-lbl { font-size: 0.68rem; font-weight: 700; text-transform:uppercase; letter-spacing:0.5px; color:#7b1fa2; margin-top:3px; display:block; }
    .margin-table { width:100%; border-collapse:collapse; font-size:0.83rem; }
    .margin-table th { text-align:left; padding:8px 10px; background:#f5f0ff; color:#4a148c; font-weight:700; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.4px; border-radius:4px; }
    .margin-table td { padding:9px 10px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .margin-table tr:last-child td { border-bottom:none; }
    .margin-table tr:hover td { background:#fafafa; }
    .margin-order-ref { font-weight:700; color:#1a1a2e; }
    .margin-label-dot { display:inline-block; width:8px; height:8px; border-radius:3px; margin-right:5px; vertical-align:middle; }
    .margin-amount { font-weight:800; color:#2e7d32; }
    .margin-zero { color:#bbb; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 90px; }

    /* ── ADMIN: store tabs ── */
    .store-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .store-tab {
      padding: 7px 18px; border-radius: 20px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 2px solid transparent; transition: all 0.15s; background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .store-tab.active { color: white; }
    .store-tab:not(.active) { color: #444; }

    /* ── ACCORDION LIST ── */
    .orders-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .order-ref { font-size: 0.92rem; font-weight: 700; color: #1a1a2e; }
    .order-num { font-size: 0.78rem; color: #888; font-weight: 500; margin-left: 6px; }
    .label-badge { color: white; border-radius: 6px; padding: 2px 9px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; margin-left: 6px; }

    /* ── ACCORDION CARD ── */
    .acc-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .acc-header {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      cursor: pointer; transition: background 0.15s; user-select: none;
    }
    .acc-header:hover { background: #fafafa; }
    .acc-header-main { flex: 1; min-width: 0; }
    .acc-title-row { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; margin-bottom: 5px; }
    .acc-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .acc-date { font-size: 0.78rem; color: #666; }
    .acc-counts { display: flex; gap: 6px; flex-shrink: 0; }
    .count-pill { background: #f5f5f8; border-radius: 8px; padding: 5px 8px; text-align: center; min-width: 44px; }
    .cp-num { display: block; font-size: 1rem; font-weight: 700; color: #1a1a2e; line-height: 1.1; }
    .cp-lbl { display: block; font-size: 0.6rem; color: #888; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }
    .acc-arrow { font-size: 0.75rem; color: #bbb; flex-shrink: 0; width: 16px; text-align: center; }

    /* ── STATUS BADGES ── */
    .status-delivered { display: inline-flex; align-items: center; background: #e8f5e9; color: #2e7d32; border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
    .status-out       { display: inline-flex; align-items: center; background: #e3f2fd; color: #1565c0; border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
    .status-transit   { display: inline-flex; align-items: center; background: #fff8e1; color: #f57f17; border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }
    .status-pending   { display: inline-flex; align-items: center; background: #fce4ec; color: #c62828; border-radius: 6px; padding: 2px 8px; font-size: 0.72rem; font-weight: 600; }

    /* ── ACCORDION BODY ── */
    .acc-body { border-top: 1px solid #f0f0f0; }
    .acc-body-inner { padding: 14px 16px 16px; }
    .acc-tracking-label, .acc-items-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      color: #aaa; margin-bottom: 6px; margin-top: 12px;
    }
    .acc-tracking-label { margin-top: 0; }
    .tracking-link { display: block; color: #1565c0; text-decoration: none; font-size: 0.76rem; font-family: 'Courier New', monospace; margin-bottom: 3px; }
    .tracking-link:hover { text-decoration: underline; }
    .no-tracking { font-size: 0.76rem; color: #bbb; font-style: italic; }
    .acc-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .acc-item:last-child { border-bottom: none; }
    .item-img { width: 70px; height: 90px; object-fit: contain; flex-shrink: 0; border-radius: 6px; background: #f9f9f9; padding: 4px; }
    .item-img-placeholder { width: 70px; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; background: #f5f5f5; border-radius: 6px; }
    .acc-item-info { display: flex; flex-direction: column; gap: 3px; }
    .acc-item-qty { font-size: 0.72rem; font-weight: 700; color: #b5179e; }
    .acc-item-name { font-size: 0.82rem; color: #333; }

    /* ── DELIVERED GROUP ── */
    .delivered-group { margin-top: 10px; }
    .delivered-header {
      display: flex; align-items: center; gap: 10px; padding: 12px 18px;
      background: white; border-radius: 12px; cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07); user-select: none; transition: background 0.15s;
    }
    .delivered-header:hover { background: #fafafa; }
    .delivered-title { font-size: 0.9rem; font-weight: 700; color: #2e7d32; }
    .delivered-count { background: #e8f5e9; color: #2e7d32; border-radius: 20px; padding: 1px 10px; font-size: 0.75rem; font-weight: 700; }
    #deliveredList { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

    /* ── SECTION GROUPS ── */
    .section-group { margin-bottom: 18px; }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 0 4px; }
    .section-title { font-size: 0.85rem; font-weight: 700; color: #444; }
    .section-count { background: #eee; color: #555; border-radius: 20px; padding: 1px 9px; font-size: 0.72rem; font-weight: 700; }

    /* ── SUMMARY BAR ── */
    #summaryBar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
      background: linear-gradient(135deg, #560bad 0%, #b5179e 100%);
      color: white; display: none; align-items: center; justify-content: center;
      gap: 0; padding: 10px 24px;
      box-shadow: 0 -2px 16px rgba(86,11,173,0.35);
    }
    .sum-item { text-align: center; padding: 0 22px; }
    .sum-num  { display: block; font-size: 1.7rem; font-weight: 800; line-height: 1.1; }
    .sum-lbl  { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.7px; opacity: 0.85; margin-top: 1px; }
    .sum-sep  { width: 1px; height: 44px; background: rgba(255,255,255,0.22); flex-shrink: 0; }

    /* ── ORDER MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-box {
      background: white; border-radius: 18px; width: 100%; max-width: 620px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    .modal-header {
      padding: 18px 22px 14px; border-bottom: 2px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: white; z-index: 1;
    }
    .modal-header-left { display: flex; flex-direction: column; gap: 3px; }
    .modal-order-ref { font-size: 1.1rem; font-weight: 800; }
    .modal-order-meta { font-size: 0.78rem; color: #888; }
    .modal-close {
      background: #f0f0f0; border: none; width: 32px; height: 32px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer; color: #555; display: flex; align-items: center;
      justify-content: center; transition: background 0.15s; flex-shrink: 0;
    }
    .modal-close:hover { background: #e0e0e0; }
    .modal-body { padding: 16px 22px 22px; }
    .modal-no-items { text-align: center; color: #bbb; padding: 36px 0; font-size: 0.9rem; }
    .product-row {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px solid #f5f5f5;
    }
    .product-row:last-child { border-bottom: none; }
    .product-img-wrap {
      width: 76px; height: 96px; flex-shrink: 0; border-radius: 10px;
      background: #f7f7f7; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .product-img-fallback { font-size: 2.4rem; }
    .product-info { flex: 1; min-width: 0; }
    .product-qty-badge {
      display: inline-block; background: #f0f0f0; color: #555; border-radius: 5px;
      padding: 2px 8px; font-size: 0.72rem; font-weight: 700; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .product-name { font-size: 0.92rem; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
    .product-sku { font-size: 0.72rem; color: #aaa; font-family: 'Courier New', monospace; }
    .order-card { cursor: pointer; }

    /* ── CREDENTIALS TABLE (admin only) ── */
    .creds-panel {
      background: white; border-radius: 12px; padding: 20px; margin-bottom: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }
    .creds-panel h3 { font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }
    .creds-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .creds-table th { text-align: left; padding: 8px 12px; background: #f5f5f5; color: #555; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.4px; }
    .creds-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
    .creds-table tr:last-child td { border-bottom: none; }
    .store-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 7px; vertical-align: middle; }
    .copy-btn { background: #f0f0f0; border: none; border-radius: 5px; padding: 3px 8px; font-size: 0.72rem; cursor: pointer; color: #555; }
    .copy-btn:hover { background: #e0e0e0; }

    /* ── RICH ACCORDION DETAIL ── */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 14px; padding: 12px; background: #f8f8fc; border-radius: 10px; }
    .detail-cell { display: flex; flex-direction: column; gap: 2px; }
    .detail-lbl { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; }
    .detail-val { font-size: 0.84rem; font-weight: 600; color: #1a1a2e; }
    .detail-val.mono { font-family: 'Courier New', monospace; font-size: 0.78rem; }
    .margin-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding: 10px 14px; background: linear-gradient(135deg,#f3e5f5,#e8eaf6); border-radius: 10px; }
    .margin-bar-label { font-size: 0.72rem; font-weight: 700; color: #7b1fa2; text-transform: uppercase; letter-spacing: 0.5px; }
    .margin-bar-value { font-size: 1.1rem; font-weight: 800; color: #4a148c; }
    .acc-item-sku { font-size: 0.68rem; color: #bbb; font-family: 'Courier New', monospace; margin-top: 2px; }
    .acc-item-margin { font-size: 0.7rem; color: #2e7d32; font-weight: 700; margin-top: 2px; }
    .section-divider { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #ccc; margin: 14px 0 6px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>📦 Tomorrow Telecom</h1>
      <p>Delivery Tracking Portal</p>
    </div>
    <label>Username</label>
    <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Incorrect username or password</div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <header>
    <div class="header-left">
      <h1>📦 Tomorrow Telecom</h1>
      <div class="subtitle">Delivery Tracking Portal</div>
    </div>
    <div class="header-right">
      <div class="user-pill" id="userPill"></div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <!-- MAIN TABS -->
  <div id="mainTabBar" style="display:none; background:white; border-bottom:2px solid #eee; position:sticky; top:64px; z-index:99;">
    <div style="max-width:1200px; margin:0 auto; display:flex; gap:0;">
      <button class="main-tab active" id="tabDelivery" onclick="switchMainTab('delivery')">📦 Delivery Tracking</button>
      <button class="main-tab" id="tabMargins" onclick="switchMainTab('margins')">💰 Margins</button>
    </div>
  </div>

  <!-- DELIVERY VIEW -->
  <div id="deliveryView" class="container">
    <div id="adminCredsSection" style="display:none">
      <div class="creds-panel">
        <h3>🔑 Store Login Credentials</h3>
        <table class="creds-table" id="credsTable"></table>
      </div>
    </div>
    <div id="adminTabs" style="display:none; margin-bottom:16px;">
      <div class="store-tabs" id="storeTabs"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div class="store-tabs" id="statusTabs"></div>
    </div>
    <div id="calendarContainer"></div>
  </div>

  <!-- MARGINS VIEW -->
  <div id="marginsView" style="display:none;">
    <div style="max-width:1200px; margin:0 auto; padding:24px 16px 90px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
        <div style="font-size:1.1rem; font-weight:800; color:#4a148c;">💰 Margins Dashboard</div>
        <div style="display:flex; align-items:center; gap:10px;" id="marginStoreWrapper">
          <label style="font-size:0.78rem; font-weight:600; color:#666;">Store:</label>
          <select id="marginStoreSelect" onchange="renderMarginPanel()" style="border:1.5px solid #e0e0e0; border-radius:8px; padding:6px 12px; font-size:0.85rem; outline:none; color:#333; background:white; cursor:pointer;">
            <option value="ALL">All Stores</option>
          </select>
        </div>
      </div>
      <div id="marginContent"></div>
    </div>
  </div>
</div>

<!-- SUMMARY BAR -->
<div id="summaryBar"></div>

<!-- ORDER DETAIL MODAL -->
<div id="orderModal" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-order-ref" id="modalTitle"></div>
        <div class="modal-order-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('orderModal').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── USERS ───────────────────────────────────────────────────────────────────
const USERS = [

  { username: 'cho',       password: 'CHO2026!',        role: 'store',    label: 'CHO',      name: 'CHO' },
];

// ── PRODUCT CATALOG ──────────────────────────────────────────────────────────
// Key = SKU prefix (matched via startsWith). Add new devices here as needed.
const PRODUCTS = {

  'SAM A256':        { name: 'Samsung Galaxy A25 5G',        img: 'https://images.samsung.com/is/image/samsung/p6pim/us/sm-a256uzkaxaa/gallery/us-galaxy-a25-5g-sm-a256-sm-a256uzkaxaa-thumb-539791547?$650_519_PNG$' },

// ── MARGINS ──────────────────────────────────────────────────────────────────
// Phones & gateway = $19.50 each | Tablets = $8.00 each
const MARGIN_RATES = {
  PHONE: 19.50,
  TABLET: 8.00,
};
const TABLET_SKUS = ['SAM X218U', 'TMO REVVL TAB'];

function getItemMargin(sku) {
  const upper = sku.toUpperCase();
  if (TABLET_SKUS.some(t => upper.startsWith(t.toUpperCase()))) return MARGIN_RATES.TABLET;
  // SIM cards / accessories have no margin
  if (upper.includes('SIM') || upper.includes('TRIPLESIM')) return 0;
  return MARGIN_RATES.PHONE;
}

function lookupProduct(sku) {
  const skuUp = (sku || '').toUpperCase();
  for (const [key, val] of Object.entries(PRODUCTS)) {
    if (skuUp.startsWith(key)) {
      const prod = { ...val };
      for (const [imgKey, imgData] of Object.entries(PRODUCT_IMGS)) {
        if (skuUp.startsWith(imgKey.toUpperCase())) { prod.img = imgData; break; }
      }
      return prod;
    }
  }
  return { name: sku, img: null };
}

// ── ITEM COUNTING ─────────────────────────────────────────────────────────
// boxes = UPS tracking numbers count; phones/bts/sims from item list
function countItems(o) {
  const items  = o.items   || [];
  const boxes  = (o.tracking || []).length;
  let phones=0, bts=0, sims=0;
  for (const item of items) {
    const qty = parseInt(item.qty) || 0;
    const sku = (item.sku || '').toUpperCase();
    if (sku.includes('TRIPLESIM') || (sku.includes('SIM') && !sku.includes('REVVL'))) {
      sims += qty;
    } else if (TABLET_SKUS.some(t => sku.startsWith(t.toUpperCase())) ||
               sku.includes('FAST5688') || sku.includes('GATEWAY')) {
      bts += qty;
    } else {
      phones += qty;
    }
  }
  return { boxes, phones, bts, sims };
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function statusLabel(s) {
  return s === 'Delivered'      ? '✓ Delivered'
       : s === 'OutForDelivery' ? '🚚 Out for Delivery'
       : s === 'InTransit'      ? '📦 In Transit'
       : '⏳ Ordered';
}
function statusClass(s) {
  return s === 'Delivered'      ? 'status-delivered'
       : s === 'OutForDelivery' ? 'status-out'
       : s === 'InTransit'      ? 'status-transit'
       : 'status-pending';
}
function fmtDate(d) {
  if (!d || d === 'PENDING') return 'TBD';
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ── MARGINS PANEL ─────────────────────────────────────────────────────────────
function renderMarginPanel() {
  const select = document.getElementById('marginStoreSelect');

  // Populate store options once
  if (select.options.length <= 1) {
    const labels = [...new Set(ORDERS.filter(o => o.items && o.items.length).map(o => o.label))].sort();
    labels.forEach(lbl => {
      const opt = document.createElement('option'); opt.value = lbl; opt.textContent = lbl;
      select.appendChild(opt);
    });
    if (currentUser && currentUser.role === 'store') {
      select.value = currentUser.label; select.disabled = true;
    }
  }

  const filterLabel = (currentUser && currentUser.role === 'store') ? currentUser.label : select.value;
  let orders = ORDERS.filter(o => o.items && o.items.length > 0);
  if (filterLabel !== 'ALL') orders = orders.filter(o => o.label === filterLabel);
  orders = [...orders].sort((a,b) => new Date(b.date) - new Date(a.date));

  // Stats
  let grandTotal = 0, totalPhonesCount = 0;
  orders.forEach(o => {
    (o.items||[]).forEach(item => {
      const qty = parseInt(item.qty)||0;
      grandTotal += getItemMargin(item.sku) * qty;
      if (getItemMargin(item.sku) === MARGIN_RATES.PHONE) totalPhonesCount += qty;
    });
  });

  const statsHtml = `<div class="margin-stat-row">
    <div class="margin-stat"><span class="margin-stat-num">$${grandTotal.toFixed(2)}</span><span class="margin-stat-lbl">Total Margin</span></div>
    <div class="margin-stat"><span class="margin-stat-num">${orders.length}</span><span class="margin-stat-lbl">Orders</span></div>
    <div class="margin-stat"><span class="margin-stat-num">${totalPhonesCount}</span><span class="margin-stat-lbl">Phones</span></div>
    <div class="margin-stat"><span class="margin-stat-num">$${orders.length > 0 ? (grandTotal/orders.length).toFixed(2) : '0.00'}</span><span class="margin-stat-lbl">Avg / Order</span></div>
  </div>`;

  // Per-order table rows (no images)
  const tableRows = orders.map(o => {
    const color = COLORS[o.label] || '#888';
    let orderMargin = 0;
    let totalItems = 0;
    (o.items||[]).forEach(item => {
      const qty = parseInt(item.qty)||0;
      totalItems += qty;
      orderMargin += getItemMargin(item.sku) * qty;
    });
    return `<tr>
      <td class="margin-order-ref">${o.ref}${o.num ? `<span style="font-size:0.7rem;color:#bbb;margin-left:5px;">#${o.num}</span>` : ''}</td>
      <td><span style="background:${color};color:white;border-radius:5px;padding:1px 8px;font-size:0.7rem;font-weight:700;">${o.label}</span></td>
      <td style="color:#666;">${fmtDate(o.date)}</td>
      <td style="font-weight:700;color:#333;">${totalItems}</td>
      <td class="${orderMargin > 0 ? 'margin-amount' : 'margin-zero'}">$${orderMargin.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const orderCards = orders.length > 0
    ? `<div style="background:white;border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,0.08);overflow:hidden;">
        <table class="margin-table" style="width:100%;">
          <thead><tr>
            <th>Order Ref</th><th>Store</th><th>Date</th><th>Items</th><th>Margin</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>`
    : '';

  document.getElementById('marginContent').innerHTML = statsHtml + (orderCards || '<div style="text-align:center;color:#bbb;padding:40px 0;">No orders with item data found</div>');
}

function doLogin() {
  const u    = document.getElementById('usernameInput').value.trim().toLowerCase();
  const p    = document.getElementById('passwordInput').value;
  const user = USERS.find(x => x.username === u && x.password === p);
  if (!user) { document.getElementById('loginError').style.display='block'; return; }
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display   = 'block';
  document.getElementById('userPill').textContent = user.name;
  document.getElementById('mainTabBar').style.display = 'block';
  if (user.role === 'admin') {
    document.getElementById('adminCredsSection').style.display = 'block';
    document.getElementById('adminTabs').style.display         = 'block';
    renderCredsTable();
    renderStoreTabs();
  } else {
    activeStore = user.label;
  }
  renderStatusTabs();
  renderCalendar();
}
function doLogout() {
  currentUser = null; activeStore = null; activeStatus = 'InProgress';
  document.getElementById('loginScreen').style.display        = 'flex';
  document.getElementById('appScreen').style.display          = 'none';
  document.getElementById('adminCredsSection').style.display  = 'none';
  document.getElementById('adminTabs').style.display          = 'none';
  document.getElementById('loginError').style.display         = 'none';
  document.getElementById('usernameInput').value = '';
  document.getElementById('passwordInput').value = '';
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function renderCalendar() {
  let orders = ORDERS.slice();
  if (currentUser && currentUser.role === 'store') {
    orders = orders.filter(o => o.label === currentUser.label);
  } else if (activeStore) {
    orders = orders.filter(o => o.label === activeStore);
  }
  // Apply status filter
  if (activeStatus === 'InProgress') {
    orders = orders.filter(o => o.status === 'OutForDelivery' || o.status === 'InTransit');
  } else if (activeStatus === 'Ordered') {
    orders = orders.filter(o => o.status === 'InProcess');
  } else if (activeStatus === 'Delivered') {
    orders = orders.filter(o => o.status === 'Delivered');
  }

  const onTheWay  = orders.filter(o => o.status === 'OutForDelivery' || o.status === 'InTransit');
  const ordered   = orders.filter(o => o.status === 'InProcess');
  const delivered = orders.filter(o => o.status === 'Delivered');

  let html = '';
